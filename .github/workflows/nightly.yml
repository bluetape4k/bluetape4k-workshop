name: Nightly

on:
  schedule:
    - cron: '0 19 * * 1-6'  # Daily smoke, UTC 19:00 (KST 04:00) Mon-Sat
    - cron: '0 19 * * 0'    # Weekly full, UTC 19:00 (KST 04:00) Sunday
  workflow_dispatch:
    inputs:
      scope:
        description: 'Nightly scope to run'
        required: true
        type: choice
        default: full
        options:
          - smoke
          - full

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  build:
    name: Build (compile only)
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Build (compile only)
        run: ./gradlew build -x test --parallel --continue
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

  test:
    name: Test (Testcontainers)
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 19 * * 0') || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full') }}

    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Checkout bluetape4k projects
        uses: actions/checkout@v4
        with:
          repository: bluetape4k/bluetape4k-projects
          ref: develop
          path: .bluetape4k-projects
      - name: Build bluetape4k mock server images
        working-directory: .bluetape4k-projects
        run: ./gradlew :bluetape4k-mock-web-server:jibDockerBuild :bluetape4k-mock-webflux-server:jibDockerBuild --no-configuration-cache --max-workers=1
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
      - name: Run tests
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"
          DD_API_KEY: "test-api-key"
          DD_APPLICATION_KEY: "test-application-key"
        run: ./gradlew test --continue --max-workers=1
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Nightly results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "Nightly failed"
            exit 1
          fi
          echo "Nightly passed"
