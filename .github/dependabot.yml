version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 8
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
          - "com.google.devtools.ksp*"
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring*"
      testcontainers:
        patterns:
          - "org.testcontainers*"
      jackson2:
        patterns:
          - "com.fasterxml.jackson*"
      jackson3:
        patterns:
          - "tools.jackson*"
      aws:
        patterns:
          - "software.amazon.awssdk*"
          - "aws.sdk.kotlin*"
          - "aws.smithy.kotlin*"
      bluetape4k:
        patterns:
          - "io.github.bluetape4k*"
    ignore:
      # Compatibility-line aliases such as jackson2/jackson3, spring-boot3/spring-boot4,
      # and kafka3/kafka4 are manual major migrations. Dependabot cannot infer the
      # version-catalog alias contract from shared Maven coordinates.
      - dependency-name: "com.fasterxml.jackson*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "tools.jackson*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.springframework.boot"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.springframework.boot:*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.apache.kafka:*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.springframework.kafka:*"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
